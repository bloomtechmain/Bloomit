name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Typecheck & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Verify PostgreSQL is reachable
        run: pg_isready -h localhost -p 5432 -U postgres

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bloomtech_test
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: test-refresh-secret-not-for-production
          SMTP_HOST: localhost
          SMTP_PORT: 1025
        run: npx cross-env NODE_ENV=test npx dotenv -e .env.test -- npx jest --runInBand --verbose 2>&1

  frontend-typecheck:
    name: Frontend — Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript type check
        working-directory: client
        run: npx tsc --noEmit
